name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (reactor)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      # Test *execution* is intentionally skipped for now: `mscartoes` has a
      # @RabbitListener that connects to a real broker on context startup,
      # and the gateway's Keycloak issuer-uri may be fetched eagerly too.
      # Neither service is available in this job yet. Compiling test sources
      # still catches compile-time breakage; wiring up service containers
      # (RabbitMQ, Keycloak) so tests actually run is tracked separately.
      - name: Build all modules (compile + package, tests compiled but not run)
        run: mvn -B -ntp package -DskipTests
