name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (reactor)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      # Tests now run for real. The assumption that mscartoes'
      # @RabbitListener and the gateway's Keycloak issuer-uri lookup block
      # context startup (and thus require a real broker/IdP in this job)
      # turned out not to hold: Spring AMQP's listener container retries
      # the broker connection asynchronously in the background instead of
      # failing context refresh, and the resource server's issuer lookup
      # doesn't block startup either -- verified locally with neither
      # RabbitMQ nor Keycloak running. This CI run is the first real
      # confirmation on GitHub's runner; if it goes red for connectivity
      # reasons unrelated to actual test failures, that's the signal to
      # add Testcontainers instead of reverting to -DskipTests silently.
      - name: Build all modules and run tests
        run: mvn -B -ntp test
