#nome da aplicacao
spring:
  application:
    name: eurekaserver
  security:
    basic:
      enabled: true
    user:
      # Local-dev defaults so `mvn spring-boot:run` still works out of the box.
      # Override EUREKA_USER / EUREKA_PASSWORD for any real deployment.
      name: ${EUREKA_USER:cursoms-eureka-user}
      password: ${EUREKA_PASSWORD:changeme-local-only}

# porta onde vai rodar o eureka
server:
  port: 8761

# o cliente não irá se registrar automaticamente com o servidor Eureka ao iniciar.
eureka:
  client:
    register-with-eureka: false
    # o registro dos micro servicos nao serao buscados
    fetch-registry: false